name: Restore Branch From Commit

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: "Branch name to restore"
        required: true
        default: "dev"

      commit_hash:
        description: "Full commit hash"
        required: true
        
permissions:
  contents: write
  actions: write

jobs:
  restore-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch commit
        run: |
          git fetch origin ${{ github.event.inputs.commit_hash }}

      - name: Create branch from commit
        run: |
         git checkout -b "${{ github.event.inputs.branch_name }}" "${{ github.event.inputs.commit_hash }}"

         rm -rf .github/workflows
    
         git rm -r --cached .github/workflows || true

         git commit -m "Remove workflow files"

      - name: Push restored branch
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git
          git push -u origin "${{ github.event.inputs.branch_name }}" --force
